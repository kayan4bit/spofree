<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#05060a" />
    <meta name="description" content="Atomic Player — a futuristic, ad-free, Hi-Res music player powered by TIDAL." />
    <title>Atomic Player — Hi-Res Streaming</title>
    <link rel="apple-touch-icon" href="ios-logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* ========= Atomic Player Theme ========= */
      :root {
        --bg-base: #05060a;
        --bg-panel: #0b0d14;
        --bg-panel-2: #11131c;
        --bg-panel-3: #171a25;
        --border-subtle: rgba(255, 255, 255, 0.07);
        --border-strong: rgba(255, 255, 255, 0.12);
        --text-primary: #f4f6ff;
        --text-secondary: #9aa3c0;
        --accent: #22d3ee;
        --accent-2: #a855f7;
        --accent-3: #f472b6;
        --danger: #f87171;
      }

      html, body, #root { height: 100%; }

      /* Custom Scrollbar */
      ::-webkit-scrollbar { width: 10px; height: 10px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb {
        background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.16));
        border-radius: 8px;
        border: 2px solid transparent;
        background-clip: padding-box;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: linear-gradient(180deg, rgba(34,211,238,0.35), rgba(168,85,247,0.35));
        background-clip: padding-box;
      }
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

      body {
        background-color: var(--bg-base);
        color: var(--text-primary);
        font-family: 'Inter', 'Circular Std', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        overscroll-behavior-y: none;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }

      /* Subtle animated background grid + radial glow */
      body::before {
        content: "";
        position: fixed; inset: 0; pointer-events: none; z-index: 0;
        background:
          radial-gradient(1200px 700px at 15% -10%, rgba(34, 211, 238, 0.18), transparent 60%),
          radial-gradient(900px 600px at 110% 10%, rgba(168, 85, 247, 0.18), transparent 55%),
          radial-gradient(900px 600px at 50% 110%, rgba(244, 114, 182, 0.10), transparent 60%);
      }
      body::after {
        content: "";
        position: fixed; inset: 0; pointer-events: none; z-index: 0;
        background-image:
          linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
        background-size: 52px 52px;
        mask-image: radial-gradient(ellipse at 50% 30%, #000 40%, transparent 80%);
        -webkit-mask-image: radial-gradient(ellipse at 50% 30%, #000 40%, transparent 80%);
        opacity: 0.5;
      }
      #root { position: relative; z-index: 1; }

      .pb-safe { padding-bottom: env(safe-area-inset-bottom); }

      /* ==== Glass panels ==== */
      .atomic-glass {
        background: linear-gradient(180deg, rgba(20, 22, 34, 0.72), rgba(10, 12, 20, 0.72));
        backdrop-filter: blur(18px) saturate(140%);
        -webkit-backdrop-filter: blur(18px) saturate(140%);
        border: 1px solid var(--border-subtle);
      }
      .atomic-glass-strong {
        background: linear-gradient(180deg, rgba(16, 18, 28, 0.88), rgba(8, 9, 15, 0.88));
        backdrop-filter: blur(24px) saturate(160%);
        -webkit-backdrop-filter: blur(24px) saturate(160%);
        border: 1px solid var(--border-strong);
      }

      .atomic-gradient-text {
        background: linear-gradient(90deg, #22d3ee 0%, #a855f7 55%, #f472b6 100%);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        color: transparent;
      }

      .atomic-card {
        background: linear-gradient(180deg, rgba(23, 26, 37, 0.75), rgba(14, 16, 24, 0.85));
        border: 1px solid var(--border-subtle);
        transition: border-color 180ms ease, transform 220ms ease, background 180ms ease;
      }
      .atomic-card:hover {
        border-color: rgba(34, 211, 238, 0.35);
        background: linear-gradient(180deg, rgba(32, 36, 52, 0.85), rgba(18, 20, 30, 0.92));
      }

      .atomic-chip {
        border: 1px solid var(--border-subtle);
        background: rgba(255,255,255,0.04);
        transition: all 160ms ease;
      }
      .atomic-chip:hover { border-color: rgba(255,255,255,0.25); background: rgba(255,255,255,0.08); }
      .atomic-chip-active {
        background: linear-gradient(90deg, rgba(34,211,238,0.18), rgba(168,85,247,0.18));
        border-color: rgba(34,211,238,0.45);
        color: #fff;
      }

      .atomic-glow {
        box-shadow:
          0 0 0 1px rgba(34,211,238,0.35),
          0 10px 40px -10px rgba(34,211,238,0.45),
          0 0 60px -20px rgba(168,85,247,0.45);
      }

      /* Animations */
      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
      @keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes slideInRight { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
      @keyframes scaleIn { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }
      @keyframes pulseGlow {
        0%, 100% { box-shadow: 0 0 0 0 rgba(34, 211, 238, 0.35); }
        50%      { box-shadow: 0 0 0 14px rgba(34, 211, 238, 0); }
      }
      @keyframes orbit {
        from { transform: rotate(0deg); }
        to   { transform: rotate(360deg); }
      }
      @keyframes shimmer {
        0%   { background-position: -200% 0; }
        100% { background-position: 200% 0; }
      }

      .animate-fade-in       { animation: fadeIn 0.3s ease-out forwards; }
      .animate-slide-up      { animation: slideUp 0.4s ease-out forwards; }
      .animate-slide-right   { animation: slideInRight 0.3s ease-out forwards; }
      .animate-scale-in      { animation: scaleIn 0.2s ease-out forwards; }
      .animate-pulse-slow    { animation: pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
      .animate-pulse-glow    { animation: pulseGlow 2.4s ease-out infinite; }
      .animate-orbit-slow    { animation: orbit 18s linear infinite; }
      .animate-orbit-med     { animation: orbit 9s linear infinite reverse; }
      .animate-orbit-fast    { animation: orbit 5s linear infinite; }

      .shimmer-text {
        background: linear-gradient(90deg, #9aa3c0 0%, #f4f6ff 50%, #9aa3c0 100%);
        background-size: 200% 100%;
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        -webkit-text-fill-color: transparent;
        animation: shimmer 2.5s linear infinite;
      }

      /* Reduced motion */
      html.reduced-motion *,
      html.reduced-motion *::before,
      html.reduced-motion *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.001ms !important;
        scroll-behavior: auto !important;
      }

      /* High performance: drop blurs */
      html.high-perf .atomic-glass,
      html.high-perf .atomic-glass-strong {
        backdrop-filter: none !important;
        -webkit-backdrop-filter: none !important;
      }
      html.high-perf body::after { display: none; }

      /* Grayscale */
      html.grayscale { filter: grayscale(100%); }
    </style>

</head>

    <div id="root"></div>

</body>
</html>
